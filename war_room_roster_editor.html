function makeCoachFieldInput(span) {
  const team = span.dataset.team, role = span.dataset.role, field = span.dataset.coachfield;
  const c = rosterData.coaching[team][role];
  const origVal = c[field] ?? null;
  const cfg = field === 'age' ? {min:25,max:80,maxLen:2} : {min:0,max:40,maxLen:2};

  const inp = document.createElement('input');
  inp.className = 'chip-input'; inp.style.width='38px';
  inp.type='text'; inp.inputMode='numeric';
  inp.value = origVal ?? '';
  span.replaceWith(inp); inp.focus(); inp.select();

  function clamp(v) { return Math.max(cfg.min, Math.min(cfg.max, v)); }
  function commit() {
    const raw = parseInt(inp.value);
    const v = inp.value.trim() === '' ? null : clamp(isNaN(raw) ? (origVal ?? cfg.min) : raw);
    if (v === null) delete c[field]; else c[field] = v;
    markUnsaved();
    const ns = document.createElement('span');
    ns.className='coach-cell-editable'; ns.dataset.team=team; ns.dataset.role=role; ns.dataset.coachfield=field;
    ns.textContent = v ?? '—'; ns.style.cursor='text'; ns.title='Double-click to edit';
    if (inp.parentNode) inp.replaceWith(ns);
    ns.addEventListener('dblclick', e=>{e.stopPropagation(); makeCoachFieldInput(ns);});
    if (selectedCoach && selectedCoach.team===team && selectedCoach.role===role) refreshCoachPanel();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', ev=>{
    if(ev.key==='Enter'){ev.preventDefault();inp.blur();}
    else if(ev.key==='Escape'){ev.preventDefault();inp.removeEventListener('blur',commit);const ns=document.createElement('span');ns.className='coach-cell-editable';ns.dataset.team=team;ns.dataset.role=role;ns.dataset.coachfield=field;ns.textContent=origVal??'—';ns.style.cursor='text';ns.title='Double-click to edit';if(inp.parentNode)inp.replaceWith(ns);ns.addEventListener('dblclick',e=>{e.stopPropagation();makeCoachFieldInput(ns);});}
    else if(ev.key==='ArrowUp'){ev.preventDefault();inp.value=clamp((parseInt(inp.value)||origVal||cfg.min)+1);}
    else if(ev.key==='ArrowDown'){ev.preventDefault();inp.value=clamp((parseInt(inp.value)||origVal||cfg.min)-1);}
  });
  inp.addEventListener('input',()=>{inp.value=inp.value.replace(/[^0-9]/g,'').slice(0,cfg.maxLen);});
}

function makeCoachSchemeSelect(span) {
  const team = span.dataset.team, role = span.dataset.role;
  const c = rosterData.coaching[team][role];
  const td = rosterData.coaching[team];
  if (span.querySelector('select')) return;

  let opts, origVal, isTeamLevel = false, schemeKey;
  if (role === 'offensiveCoordinator') {
    schemeKey = 'offensiveScheme'; opts = OFF_SCHEMES; origVal = c.offensiveScheme || td.offensiveScheme || '';
  } else if (role === 'defensiveCoordinator') {
    schemeKey = 'defensiveScheme'; opts = DEF_SCHEMES; origVal = c.defensiveScheme || td.defensiveScheme || '';
  } else {
    // HC shows both — open panel instead
    selectCoach(team, role); return;
  }

  const sel = document.createElement('select');
  sel.style.cssText = 'background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-family:var(--font);font-size:10px;border-radius:3px;padding:1px 2px;outline:none;max-width:160px;';
  sel.innerHTML = opts.map(s => `<option value="${s}"${origVal===s?' selected':''}>${s}</option>`).join('');
  span.innerHTML = ''; span.appendChild(sel); sel.focus();

  function commit() {
    const v = sel.value;
    c[schemeKey] = v;
    // also update team-level for coordinator schemes
    if (role === 'offensiveCoordinator') td.offensiveScheme = v;
    if (role === 'defensiveCoordinator') td.defensiveScheme = v;
    markUnsaved();
    const cls = coachSchemeCls({role});
    span.innerHTML = `<span class="scheme-badge ${cls}" style="cursor:pointer" data-team="${team}" data-role="${role}" title="Click to change">${v}</span>`;
    span.querySelector('.scheme-badge').addEventListener('click', e=>{e.stopPropagation();makeCoachSchemeSelect(span.querySelector('.scheme-badge'));});
    if (selectedCoach && selectedCoach.team===team && selectedCoach.role===role) refreshCoachPanel();
  }
  sel.addEventListener('change', commit);
  sel.addEventListener('blur', ()=>setTimeout(commit, 100));
  sel.addEventListener('keydown', ev=>{ if(ev.key==='Escape'){span.innerHTML=`<span class="scheme-badge ${coachSchemeCls({role})}" style="cursor:pointer" data-team="${team}" data-role="${role}" title="Click to change">${origVal||'—'}</span>`;} });
}

// ─────────────────────────────────────────────
//  COACHING PANEL
// ─────────────────────────────────────────────
function selectCoach(team, role) {
  selectedCoach = { team, role };
  pendingCoachEdits = {};

  // Highlight row
  document.querySelectorAll('#coaching-tbody tr').forEach(r => {
    r.classList.toggle('selected', r.dataset.team===team && r.dataset.role===role);
  });

  showCoachPanel(true);
  refreshCoachPanel();
}

function refreshCoachPanel() {
  if (!selectedCoach) return;
  const { team, role } = selectedCoach;
  const td = rosterData.coaching[team];
  const c  = td[role];
  if (!c) return;

  const roleLbl = coachRoleLabel(role);
  document.getElementById('coaching-panel-name').textContent = `${c.firstName} ${c.lastName}`;
  document.getElementById('coaching-panel-meta').textContent = `${team} · ${roleLbl} · OVR ${c.overall ?? '—'}`;

  let html = '';

  // ── IDENTITY ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">👤</span> Identity</div>`;
  [['firstName','First Name'],['lastName','Last Name']].forEach(([k,lbl]) => {
    html += `<div class="panel-field"><label>${lbl}</label><input type="text" data-ckey="${k}" value="${(c[k]??'').replace(/"/g,'&quot;')}"></div>`;
  });
  html += `<div class="panel-field"><label>Demographic</label><select data-ckey="demographic">
    <option value="">— unset —</option>
    ${DEMOGRAPHICS.map(d=>`<option${c.demographic===d?' selected':''}>${d}</option>`).join('')}
  </select></div>`;
  html += '</div>';

  // ── VITALS & DEV TRAIT ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">📊</span> Vitals</div>`;
  html += `<div class="panel-field"><label>Overall</label><input type="number" data-ckey="overall" min="40" max="99" value="${c.overall??''}"></div>`;
  html += `<div class="panel-field"><label>Dev Trait</label><select data-ckey="devTrait">
    <option value="">— auto —</option>
    ${COACH_DEV_TRAITS.map(d=>`<option value="${d}"${c.devTrait===d?' selected':''}>${d}</option>`).join('')}
  </select></div>`;
  html += `<div class="panel-field"><label>Age</label><input type="number" data-ckey="age" min="25" max="80" value="${c.age??''}"></div>`;
  html += `<div class="panel-field"><label>Experience (yrs)</label><input type="number" data-ckey="experience" min="0" max="40" value="${c.experience??''}"></div>`;
  html += '</div>';

  // ── APPEARANCE ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">👔</span> Appearance</div>`;
  html += `<div class="panel-field"><label>Clothing Type</label><input type="number" data-ckey="clothingType" min="0" max="20" value="${c.clothingType??''}" placeholder="—"></div>`;
  html += `<div class="panel-field"><label>Clothing Color ID</label><input type="number" data-ckey="clothingColorId" min="0" max="100" value="${c.clothingColorId??''}" placeholder="—"></div>`;
  html += `<div class="panel-field"><label>Wearing Hat</label><select data-ckey="wearingHat">
    <option value="">— unset —</option>
    <option value="true"${c.wearingHat===true?' selected':''}>Yes</option>
    <option value="false"${c.wearingHat===false?' selected':''}>No</option>
  </select></div>`;
  html += `<div style="font-size:9px;color:var(--text3);margin-top:2px;font-style:italic;">clothingType: outfit index. clothingColorId: color variant (0–100+).</div>`;
  html += '</div>';

  // ── SCHEMES ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">🎯</span> Scheme</div>`;
  if (role === 'headCoach') {
    html += `<div class="coach-scheme-row"><label>Off. Scheme</label><select data-tdkey="offensiveScheme">
      ${OFF_SCHEMES.map(s=>`<option${td.offensiveScheme===s?' selected':''}>${s}</option>`).join('')}
    </select></div>`;
    html += `<div class="coach-scheme-row"><label>Def. Scheme</label><select data-tdkey="defensiveScheme">
      ${DEF_SCHEMES.map(s=>`<option${td.defensiveScheme===s?' selected':''}>${s}</option>`).join('')}
    </select></div>`;
    html += `<div class="coach-scheme-row"><label>Leadership Trait</label><select data-tdkey="leadershipTrait">
      <option value="">— unset —</option>
      ${LEADERSHIP_TRAITS.map(t=>`<option${td.leadershipTrait===t?' selected':''}>${t}</option>`).join('')}
    </select></div>`;
  } else if (role === 'offensiveCoordinator') {
    html += `<div class="coach-scheme-row"><label>Off. Scheme</label><select data-ckey="offensiveScheme">
      ${OFF_SCHEMES.map(s=>`<option${(c.offensiveScheme||td.offensiveScheme)===s?' selected':''}>${s}</option>`).join('')}
    </select></div>`;
  } else if (role === 'defensiveCoordinator') {
    html += `<div class="coach-scheme-row"><label>Def. Scheme</label><select data-ckey="defensiveScheme">
      ${DEF_SCHEMES.map(s=>`<option${(c.defensiveScheme||td.defensiveScheme)===s?' selected':''}>${s}</option>`).join('')}
    </select></div>`;
  }
  html += '</div>';

  // ── TEAM PHILOSOPHY (HC only) ──
  if (role === 'headCoach') {
    const agg = td.aggressiveness ?? 5;
    const rb  = td.rbWorkload ?? 5;
    html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">⚙️</span> Team Philosophy</div>`;
    html += `<div class="meter-slider-row">
      <label>Aggressiveness</label>
      <input type="range" min="1" max="10" value="${agg}" data-tdkey="aggressiveness" oninput="document.getElementById('agg-val').textContent=this.value;pendingCoachEdits['td.aggressiveness']=parseInt(this.value);markUnsaved();">
      <span class="meter-slider-val" id="agg-val">${agg}</span>
    </div>`;
    html += `<div class="meter-slider-row">
      <label>RB Workload</label>
      <input type="range" min="1" max="10" value="${rb}" data-tdkey="rbWorkload" oninput="document.getElementById('rb-val').textContent=this.value;pendingCoachEdits['td.rbWorkload']=parseInt(this.value);markUnsaved();">
      <span class="meter-slider-val" id="rb-val">${rb}</span>
    </div>`;
    html += `<div style="font-size:9px;color:var(--text3);margin-top:4px;font-style:italic;">Aggressiveness: 4th-down calls, blitz rate, fake punts. RB Workload: touches per game weight.</div>`;
    html += '</div>';
  }

  // ── COACHING ATTRIBUTES (role-specific) ──
  const coachAttrs = COACH_ATTRS[role];
  if (coachAttrs) {
    const roleLabel = role === 'headCoach' ? 'HC' : role === 'offensiveCoordinator' ? 'OC' : 'DC';
    html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">⚡</span> ${roleLabel} Attributes</div>`;
    html += `<div class="coach-attr-note">Range 40–99. Blank = auto-generated from OVR.</div>`;
    html += `<div class="coach-attr-grid">`;
    coachAttrs.forEach(a => {
      html += `<div class="coach-attr-item">
        <label title="${a.tip}">${a.label}</label>
        <input type="number" data-coachattr="${a.key}" value="${c[a.key]??''}" min="40" max="99" placeholder="—">
      </div>`;
    });
    html += '</div></div>';
  }

  document.getElementById('coaching-panel-body').innerHTML = html;

  // Attach change listeners — coach-level fields
  document.querySelectorAll('#coaching-panel-body [data-ckey]').forEach(el => {
    const handler = () => {
      const key = el.dataset.ckey;
      let val;
      if (el.type === 'number')        val = el.value === '' ? null : parseFloat(el.value);
      else if (el.tagName === 'SELECT' && (key === 'wearingHat')) val = el.value === '' ? null : (el.value === 'true');
      else                             val = el.value;
      pendingCoachEdits['c.' + key] = val;
      markUnsaved();
    };
    el.addEventListener('change', handler);
    el.addEventListener('input',  handler);
  });

  // Team-level fields (HC scheme/philosophy selects — sliders use inline oninput)
  document.querySelectorAll('#coaching-panel-body [data-tdkey]').forEach(el => {
    if (el.type === 'range') return;
    el.addEventListener('change', () => {
      pendingCoachEdits['td.' + el.dataset.tdkey] = el.value;
      markUnsaved();
    });
  });

  // Coaching attribute inputs
  document.querySelectorAll('#coaching-panel-body [data-coachattr]').forEach(el => {
    el.addEventListener('change', () => {
      const key = el.dataset.coachattr;
      const val = el.value === '' ? null : parseInt(el.value);
      pendingCoachEdits['ca.' + key] = val;
      markUnsaved();
    });
  });
}

function saveCoachPanel() {
  if (!selectedCoach) return;
  const { team, role } = selectedCoach;
  const td = rosterData.coaching[team];
  const c  = td[role];

  for (const [fullKey, val] of Object.entries(pendingCoachEdits)) {
    if (fullKey.startsWith('c.')) {
      const key = fullKey.slice(2);
      if (val === null || val === '') delete c[key]; else c[key] = val;
      // Mirror scheme changes up to teamData
      if (key === 'offensiveScheme') td.offensiveScheme = val;
      if (key === 'defensiveScheme') td.defensiveScheme = val;
    } else if (fullKey.startsWith('td.')) {
      const key = fullKey.slice(3);
      const numVal = (key === 'aggressiveness' || key === 'rbWorkload') ? parseInt(val) : val;
      if (val === '' || val === null) delete td[key]; else td[key] = numVal;
    } else if (fullKey.startsWith('ca.')) {
      // Coaching attributes — stored directly on the coach object
      const key = fullKey.slice(3);
      if (val === null) delete c[key]; else c[key] = val;
    }
  }

  pendingCoachEdits = {};
  markUnsaved();
  refreshCoachPanel();
  renderCoachingTable();
  toast('Coach saved');
}

function discardCoachChanges() {
  pendingCoachEdits = {};
  refreshCoachPanel();
  toast('Changes discarded');
}

function onCoachSearchInput() {
  const val = document.getElementById('coach-search').value;
  document.getElementById('coach-search-clear').style.display = val ? 'block' : 'none';
  applyCoachFilters();
}

function clearCoachSearch() {
  document.getElementById('coach-search').value = '';
  document.getElementById('coach-search-clear').style.display = 'none';
  applyCoachFilters();
  document.getElementById('coach-search').focus();
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}
</script>
