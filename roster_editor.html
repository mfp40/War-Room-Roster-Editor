<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Room — Roster Editor</title>
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --bg4: #222730;
    --border: #2a2f3a;
    --border2: #363c4a;
    --text: #e8eaf0;
    --text2: #8b91a0;
    --text3: #555c6e;
    --accent: #4f8ef7;
    --accent-dim: #1e3460;
    --green: #3ecf8e;
    --green-dim: #0d3325;
    --amber: #f5a623;
    --amber-dim: #3d2800;
    --red: #f25555;
    --red-dim: #3d1212;
    --elite: #c8f56a;
    --elite-dim: #1e3208;
    --purple: #b87fff;
    --purple-dim: #2a1a4a;
    --teal: #4fd1c5;
    --teal-dim: #0d2e2b;
    --header-h: 52px;
    --toolbar-h: 48px;
    --row-h: 30px;
    --col-name: 160px;
    --col-team: 46px;
    --col-pos: 44px;
    --col-ovr: 46px;
    --col-personality: 130px;
    --col-num: 54px;
    --col-attr: 50px;
    --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --panel-w: 320px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    height: var(--header-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    white-space: nowrap;
  }
  #header h1 span { color: var(--accent); }
  #file-status { font-size: 11px; color: var(--text3); flex: 1; }
  .hbtn {
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font);
    letter-spacing: 0.05em;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .hbtn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
  .hbtn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .hbtn.primary:hover { background: var(--accent); color: #fff; }
  .hbtn.success { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  #unsaved-dot { width:7px; height:7px; border-radius:50%; background:var(--amber); display:none; }

  /* ── TOOLBAR ── */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  #toolbar input[type=text],
  #toolbar select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 11px;
    outline: none;
    transition: border-color 0.1s;
  }
  #toolbar input[type=text] { width: 180px; }
  #toolbar input[type=text]:focus,
  #toolbar select:focus { border-color: var(--accent); }
  #toolbar select { min-width: 80px; }
  #player-count { font-size: 11px; color: var(--text3); margin-left: 4px; white-space: nowrap; }
  .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 4px; }

  /* ── LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── GRID ── */
  #grid-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  table {
    border-collapse: collapse;
    min-width: 100%;
    table-layout: fixed;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  th {
    background: var(--bg2);
    border-bottom: 2px solid var(--border2);
    border-right: 1px solid var(--border);
    padding: 0 6px;
    height: 28px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: color 0.1s;
  }
  th:hover { color: var(--text2); }
  th.sort-asc::after  { content: ' ▲'; color: var(--accent); font-size: 9px; }
  th.sort-desc::after { content: ' ▼'; color: var(--accent); font-size: 9px; }
  th.sort-active { color: var(--accent); }

  td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0 6px;
    height: var(--row-h);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  tr { cursor: pointer; transition: background 0.06s; }
  tr:hover td { background: var(--bg3); }
  tr.selected td { background: var(--accent-dim) !important; }
  tr.selected td { border-bottom-color: #2a4070; }

  /* Column widths */
  .c-idx   { width: 36px; color: var(--text3); font-size: 10px; text-align: right; }
  .c-name  { width: var(--col-name); font-weight: 600; color: var(--text); }
  .c-team  { width: var(--col-team); text-align: center; }
  .c-pos   { width: var(--col-pos); text-align: center; }
  .c-ovr   { width: var(--col-ovr); text-align: center; font-weight: 700; }
  .c-per   { width: var(--col-personality); font-size: 10px; }
  .c-age   { width: 40px; text-align: center; color: var(--text2); }
  .c-ht    { width: 40px; text-align: center; color: var(--text2); }
  .c-wt    { width: 44px; text-align: center; color: var(--text2); }
  .c-exp   { width: 36px; text-align: center; color: var(--text2); }
  .c-dev   { width: 58px; font-size: 10px; }
  .c-attr  { width: var(--col-attr); text-align: center; color: var(--text2); }

  /* Inline-editable cell values */
  .cell-editable {
    display: inline-block;
    min-width: 24px;
    text-align: center;
    border-radius: 3px;
    padding: 1px 3px;
    cursor: text;
    transition: background 0.1s;
  }
  .cell-editable:hover { background: var(--bg4); }

  /* Attribute chips in grid */
  .chip {
    display: inline-block;
    width: 34px;
    text-align: center;
    padding: 1px 0;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .chip-elite { background: var(--elite-dim); color: var(--elite); }
  .chip-good  { background: #0d2d4a; color: #5bc4f5; }
  .chip-avg   { background: var(--amber-dim); color: var(--amber); }
  .chip-poor  { background: var(--red-dim); color: var(--red); }
  .chip-none  { background: transparent; color: var(--text3); font-size: 10px; }
  .chip-ovr   { width: 38px; font-size: 12px; }
  .chip-input {
    width: 38px;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    border-radius: 3px;
    padding: 1px 2px;
    outline: none;
    -moz-appearance: textfield;
  }
  .chip-input::-webkit-outer-spin-button,
  .chip-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Group header row */
  .group-header th {
    background: var(--bg3) !important;
    border-bottom: 1px solid var(--border) !important;
    border-top: 1px solid var(--border) !important;
    height: 18px !important;
    padding: 0 6px !important;
    font-size: 9px !important;
    letter-spacing: 0.12em !important;
    color: var(--text3) !important;
    font-weight: 600 !important;
    cursor: default !important;
    text-transform: uppercase;
  }
  .group-header th:hover { color: var(--text3) !important; }

  /* OVR color tiers */
  .ovr-elite   { color: var(--elite); }
  .ovr-probowl { color: var(--green); }
  .ovr-starter { color: var(--accent); }
  .ovr-solid   { color: var(--amber); }
  .ovr-backup  { color: var(--text2); }
  .ovr-depth   { color: var(--text3); }

  /* Dev trait badges */
  .dev-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .dev-XFactor   { background: var(--elite-dim);  color: var(--elite); }
  .dev-Superstar { background: var(--purple-dim); color: var(--purple); }
  .dev-Normal    { background: var(--bg4);        color: var(--text3); }
  .dev-Declining { background: var(--red-dim);    color: var(--red); }

  /* Personality label badges */
  .per-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .per-positive  { background: var(--green-dim);  color: var(--green); }
  .per-neutral   { background: var(--bg4);        color: var(--text2); }
  .per-edge      { background: var(--teal-dim);   color: var(--teal); }
  .per-problem   { background: var(--red-dim);    color: var(--red); }
  .per-none      { color: var(--text3); font-style: italic; }

  /* ── DETAIL PANEL ── */
  #panel {
    width: var(--panel-w);
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: width 0.15s;
  }
  #panel.collapsed { width: 0; border-left: none; }
  #panel-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #panel-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 2px;
  }
  #panel-meta {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }
  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 20px;
  }
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .panel-section {
    margin-bottom: 14px;
  }
  .panel-section-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-icon { font-size: 11px; }
  .panel-field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 8px;
  }
  .panel-field label {
    font-size: 10px;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 90px;
  }
  .panel-field input[type=number],
  .panel-field input[type=text],
  .panel-field select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 4px 7px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 11px;
    width: 100%;
    outline: none;
    transition: border-color 0.1s;
  }
  .panel-field input:focus,
  .panel-field select:focus { border-color: var(--accent); }
  .panel-field input[readonly] { color: var(--text3); cursor: default; }

  /* Sliders for hidden personality */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .slider-row label {
    font-size: 10px;
    color: var(--text2);
    white-space: nowrap;
    min-width: 100px;
    flex-shrink: 0;
  }
  .slider-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg2);
  }
  .slider-row input[type=range].slider-high::-webkit-slider-thumb { background: var(--green); }
  .slider-row input[type=range].slider-low::-webkit-slider-thumb  { background: var(--red); }
  .slider-val {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Personality clear btn */
  .per-clear-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 10px;
    font-family: var(--font);
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .per-clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* attr grid */
  .attr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 10px;
  }
  .attr-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .attr-item label {
    font-size: 10px;
    color: var(--text2);
    white-space: nowrap;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
  }
  .attr-item input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 3px 5px;
    border-radius: 3px;
    font-family: var(--font);
    font-size: 11px;
    width: 46px;
    text-align: center;
    outline: none;
    flex-shrink: 0;
  }
  .attr-item input:focus { border-color: var(--accent); }

  /* Save button */
  #panel-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #save-btn {
    flex: 1;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    transition: all 0.12s;
  }
  #save-btn:hover { background: var(--accent); color: #fff; }
  #discard-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    transition: all 0.12s;
  }
  #discard-btn:hover { border-color: var(--red); color: var(--red); }

  /* Attributes section note */
  .attr-note {
    font-size: 9px;
    color: var(--text3);
    margin-bottom: 8px;
    font-style: italic;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* Empty state */
  #panel-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text3);
    font-size: 11px;
    text-align: center;
    padding: 20px;
  }
  #panel-empty .icon { font-size: 32px; opacity: 0.3; margin-bottom: 4px; }

  /* Scrollbar */
  #grid-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  #grid-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* no-data row */
  .no-data td { text-align: center; color: var(--text3); font-size: 11px; padding: 24px; }

  /* hidden file input */
  #file-input { display: none; }

  /* Search with clear button */
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap input { padding-right: 22px; }
  #search-clear {
    position: absolute;
    right: 5px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: none;
  }
  #search-clear:hover { color: var(--text); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>War <span>Room</span></h1>
  <div id="file-status">No file loaded</div>
  <div id="unsaved-dot" title="Unsaved changes"></div>
  <button class="hbtn" onclick="document.getElementById('file-input').click()">⬆ Import JSON</button>
  <input type="file" id="file-input" accept=".json">
  <button class="hbtn success" id="save-inplace-btn" onclick="saveInPlace()" title="Commit all changes to the loaded file in memory">💾 Save</button>
  <button class="hbtn primary" onclick="exportJSON()">⬇ Export JSON</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search name, team…" oninput="onSearchInput()">
    <button id="search-clear" onclick="clearSearch()" title="Clear search">×</button>
  </div>
  <select id="f-team" onchange="applyFilters()"><option value="">All Teams</option></select>
  <select id="f-pos"  onchange="applyFilters()"><option value="">All Positions</option></select>
  <select id="f-dev"  onchange="applyFilters()">
    <option value="">All Dev Traits</option>
    <option>XFactor</option>
    <option>Superstar</option>
    <option>Normal</option>
    <option>Declining</option>
  </select>
  <select id="f-per" onchange="applyFilters()">
    <option value="">All Personalities</option>
    <option value="__none__">— Not Set —</option>
    <option>FranchiseCornerstone</option>
    <option>TeamCaptain</option>
    <option>ModelProfessional</option>
    <option>Grinder</option>
    <option>ClutchPerformer</option>
    <option>QuietLeader</option>
    <option>Competitor</option>
    <option>FanFavorite</option>
    <option>Mercenary</option>
    <option>Showboat</option>
    <option>SilentAssassin</option>
    <option>Perfectionist</option>
    <option>LockerRoomGuy</option>
    <option>SteadyVeteran</option>
    <option>Sparkplug</option>
    <option>Professional</option>
    <option>LaidBack</option>
    <option>Hothead</option>
    <option>Diva</option>
    <option>Unmotivated</option>
    <option>HeadCase</option>
  </select>
  <div class="tb-sep"></div>
  <span id="player-count">0 players</span>
</div>

<!-- MAIN -->
<div id="main">
  <!-- GRID -->
  <div id="grid-wrap">
    <table id="roster-table">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- DETAIL PANEL -->
  <div id="panel">
    <div id="panel-empty">
      <div class="icon">📋</div>
      <div>Select a player to edit</div>
    </div>
    <div id="panel-content" style="display:none; flex-direction:column; height:100%;">
      <div id="panel-header">
        <div id="panel-name">—</div>
        <div id="panel-meta">—</div>
      </div>
      <div id="panel-body"></div>
      <div id="panel-footer">
        <button id="discard-btn" onclick="discardChanges()">Discard</button>
        <button id="save-btn" onclick="savePanel()">SAVE CHANGES</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
let rosterData = null;     // full parsed JSON
let players    = [];       // flat array ref
let filtered   = [];       // current view
let sortCol    = 'overall';
let sortDir    = 'desc';
let selectedIdx = null;    // index into players[]
let pendingEdits = {};     // unsaved field changes for current player

const PERSONALITY_LABELS = [
  'FranchiseCornerstone','TeamCaptain','ModelProfessional','Grinder','ClutchPerformer',
  'QuietLeader','Competitor','FanFavorite','Mercenary','Showboat','SilentAssassin',
  'Perfectionist','LockerRoomGuy','SteadyVeteran','Sparkplug','Professional',
  'LaidBack','Hothead','Diva','Unmotivated','HeadCase'
];

const PER_CATEGORY = {
  FranchiseCornerstone:'positive', TeamCaptain:'positive', ModelProfessional:'positive',
  QuietLeader:'positive', LockerRoomGuy:'positive', SteadyVeteran:'positive',
  Grinder:'edge', Competitor:'edge', ClutchPerformer:'edge', SilentAssassin:'edge',
  Perfectionist:'edge', Sparkplug:'edge',
  FanFavorite:'neutral', Professional:'neutral', LaidBack:'neutral',
  Mercenary:'problem', Showboat:'problem', Hothead:'problem',
  Diva:'problem', Unmotivated:'problem', HeadCase:'problem'
};

// Returns the active columns array based on current position filter
function getActiveColumns() {
  const pos = document.getElementById('f-pos') ? document.getElementById('f-pos').value : '';
  let attrCols = [];
  if (pos && ATTR_GROUPS[pos]) {
    ATTR_GROUPS[pos].forEach(g => {
      g.attrs.forEach(a => attrCols.push({ key: 'attr:' + a, label: ATTR_LABEL[a] || a, cls: 'c-attr', sortable: true, group: g.label }));
    });
  } else {
    DEFAULT_ATTR_COLS.forEach(a => attrCols.push({ key: 'attr:' + a, label: ATTR_LABEL[a] || a, cls: 'c-attr', sortable: true, group: '' }));
  }
  return [...BASE_COLUMNS, ...attrCols];
}

function chipClass(v) {
  if (v == null) return 'chip-none';
  if (v >= 90) return 'chip-elite';
  if (v >= 75) return 'chip-good';
  if (v >= 60) return 'chip-avg';
  return 'chip-poor';
}

(async function init() {
  try {
    const resp = await fetch('Claude_Roster_1.json');
    if (!resp.ok) throw new Error('fetch failed');
    const json = await resp.json();
    loadRoster(json, 'Claude_Roster_1.json');
  } catch(e) {
    document.getElementById('file-status').textContent = 'Auto-load failed — use Import JSON';
  }
})();

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const json = JSON.parse(ev.target.result);
      loadRoster(json, file.name);
    } catch(err) {
      toast('Invalid JSON — ' + err.message, true);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadRoster(json, filename) {
  rosterData = json;
  players = json.players || [];
  document.getElementById('file-status').textContent = filename + ' — ' + players.length + ' players';
  buildFilters();
  applyFilters();
  toast('Loaded ' + players.length + ' players');
}

// ─────────────────────────────────────────────
//  FILTERS & SORT
// ─────────────────────────────────────────────
function buildFilters() {
  const teams = [...new Set(players.map(p => p.team).filter(Boolean))].sort();
  const positions = [...new Set(players.map(p => p.position).filter(Boolean))].sort();

  const fTeam = document.getElementById('f-team');
  fTeam.innerHTML = '<option value="">All Teams</option>' + teams.map(t => `<option>${t}</option>`).join('');

  const fPos = document.getElementById('f-pos');
  fPos.innerHTML = '<option value="">All Positions</option>' + positions.map(p => `<option>${p}</option>`).join('');
}

function applyFilters() {
  const q    = document.getElementById('search').value.toLowerCase();
  const team = document.getElementById('f-team').value;
  const pos  = document.getElementById('f-pos').value;
  const dev  = document.getElementById('f-dev').value;
  const per  = document.getElementById('f-per').value;

  // If sort col is a position-specific attr and position changed, reset sort
  if (sortCol && sortCol.startsWith('attr:')) {
    const attrKey = sortCol.slice(5);
    const validAttrs = pos && ATTR_GROUPS[pos]
      ? ATTR_GROUPS[pos].flatMap(g => g.attrs)
      : DEFAULT_ATTR_COLS;
    if (!validAttrs.includes(attrKey)) {
      sortCol = 'overall';
      sortDir = 'desc';
    }
  }

  filtered = players.filter(p => {
    const name = `${p.firstName} ${p.lastName}`.toLowerCase();
    if (q && !name.includes(q) && !(p.team||'').toLowerCase().includes(q)) return false;
    if (team && p.team !== team) return false;
    if (pos  && p.position !== pos) return false;
    if (dev  && p.developmentTrait !== dev) return false;
    if (per) {
      if (per === '__none__') { if (p.personalityLabel) return false; }
      else if (p.personalityLabel !== per) return false;
    }
    return true;
  });

  sortFiltered();
  renderTable();
  document.getElementById('player-count').textContent = filtered.length + ' players';
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av, bv;
    if (sortCol === 'name') {
      av = `${a.firstName} ${a.lastName}`;
      bv = `${b.firstName} ${b.lastName}`;
    } else if (sortCol === 'personalityLabel') {
      av = a.personalityLabel || '';
      bv = b.personalityLabel || '';
    } else if (sortCol.startsWith('attr:')) {
      const attrKey = sortCol.slice(5);
      av = (a.attributes && a.attributes[attrKey] != null) ? a.attributes[attrKey] : -Infinity;
      bv = (b.attributes && b.attributes[attrKey] != null) ? b.attributes[attrKey] : -Infinity;
    } else {
      av = a[sortCol] ?? (typeof a[sortCol] === 'number' ? -Infinity : '');
      bv = b[sortCol] ?? (typeof b[sortCol] === 'number' ? -Infinity : '');
    }
    let cmp = 0;
    if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
    else cmp = String(av).localeCompare(String(bv));
    return sortDir === 'desc' ? -cmp : cmp;
  });
}

function renderTable() {
  const pos = document.getElementById('f-pos').value;
  const COLUMNS = getActiveColumns();

  // thead — build group row + col row
  const thead = document.getElementById('thead');
  thead.innerHTML = '';

  if (pos && ATTR_GROUPS[pos]) {
    // Group header row
    const groupTr = document.createElement('tr');
    groupTr.className = 'group-header';
    // Stub cell spanning all base columns
    const stub = document.createElement('th');
    stub.colSpan = BASE_COLUMNS.length;
    groupTr.appendChild(stub);
    // Group cells
    ATTR_GROUPS[pos].forEach((g, gi) => {
      const th = document.createElement('th');
      th.colSpan = g.attrs.length;
      th.textContent = g.label;
      if (gi > 0) th.style.borderLeft = '1px solid var(--border2)';
      groupTr.appendChild(th);
    });
    thead.appendChild(groupTr);
  }

  // Column header row
  const colTr = document.createElement('tr');
  COLUMNS.forEach((col, ci) => {
    const th = document.createElement('th');
    th.className = col.cls + (sortCol === col.key ? ' sort-active ' + (sortDir === 'desc' ? 'sort-desc' : 'sort-asc') : '');
    th.textContent = col.label;
    if (col.sortable) th.onclick = () => setSort(col.key);
    // Group separator — first attr col of each group after the first
    if (col.key.startsWith('attr:') && pos && ATTR_GROUPS[pos]) {
      const attrKey = col.key.slice(5);
      ATTR_GROUPS[pos].forEach((g, gi) => {
        if (gi > 0 && g.attrs[0] === attrKey) th.style.borderLeft = '1px solid var(--border2)';
      });
    }
    colTr.appendChild(th);
  });
  thead.appendChild(colTr);

  // tbody
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="no-data"><td colspan="${COLUMNS.length}">No players match the current filters.</td></tr>`;
    return;
  }

  const rows = filtered.map((p, i) => {
    const globalIdx = players.indexOf(p);
    const isSelected = globalIdx === selectedIdx;
    const name = `${p.firstName} ${p.lastName}`;
    const ovr = p.overall ?? '—';
    const ovrCls = ovrClass(ovr);
    const perBadge = p.personalityLabel
      ? `<span class="per-badge per-${PER_CATEGORY[p.personalityLabel]||'neutral'}">${p.personalityLabel}</span>`
      : `<span class="per-badge per-none">auto</span>`;

    const ce = (field, val) => `<span class="cell-editable" data-gidx="${globalIdx}" data-field="${field}">${val ?? '—'}</span>`;

    // Attr cells — with group separators when position is filtered
    let attrCells = '';
    if (pos && ATTR_GROUPS[pos]) {
      ATTR_GROUPS[pos].forEach((g, gi) => {
        g.attrs.forEach((a, ai) => {
          const v = p.attributes && p.attributes[a] != null ? p.attributes[a] : null;
          const chipCls = chipClass(v);
          const border = (ai === 0 && gi > 0) ? ' style="border-left:1px solid var(--border2)"' : '';
          attrCells += `<td class="c-attr"${border}><span class="chip ${chipCls}" data-gidx="${globalIdx}" data-attr="${a}">${v ?? '—'}</span></td>`;
        });
      });
    } else {
      DEFAULT_ATTR_COLS.forEach(a => {
        const v = p.attributes && p.attributes[a] != null ? p.attributes[a] : null;
        const chipCls = chipClass(v);
        attrCells += `<td class="c-attr"><span class="chip ${chipCls}" data-gidx="${globalIdx}" data-attr="${a}">${v ?? '—'}</span></td>`;
      });
    }

    const devVal = p.developmentTrait || '';
    const devDisplay = devVal
      ? `<span class="dev-badge dev-${devVal}">${devVal}</span>`
      : `<span style="color:var(--text3)">—</span>`;

    return `<tr data-gidx="${globalIdx}" class="${isSelected ? 'selected' : ''}">
      <td class="c-idx">${i+1}</td>
      <td class="c-name">${name}</td>
      <td class="c-team"><span class="team-editable" data-gidx="${globalIdx}">${p.team||'—'}</span></td>
      <td class="c-pos">${p.position||'—'}</td>
      <td class="c-ovr"><span class="chip ${chipClass(typeof ovr === 'number' ? ovr : null)} chip-ovr" data-gidx="${globalIdx}" data-field="overall">${ovr}</span></td>
      <td class="c-age">${ce('age', p.age)}</td>
      <td class="c-ht">${ce('height', p.height)}</td>
      <td class="c-wt">${ce('weight', p.weight)}</td>
      <td class="c-exp">${ce('experience', p.experience)}</td>
      <td class="c-dev"><span class="dev-editable" data-gidx="${globalIdx}">${devDisplay}</span></td>
      <td class="c-per"><span class="per-editable" data-gidx="${globalIdx}">${perBadge}</span></td>
      ${attrCells}
    </tr>`;
  }).join('');

  tbody.innerHTML = rows;

  // ── ROW CLICK → open panel (ignore clicks on editable spans and chips) ──
  tbody.querySelectorAll('tr[data-gidx]').forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.classList.contains('chip')) return;
      if (e.target.dataset.field === 'overall') return;
      if (e.target.classList.contains('cell-editable')) return;
      if (e.target.classList.contains('dev-editable')) return;
      if (e.target.closest('.dev-editable')) return;
      if (e.target.classList.contains('per-editable')) return;
      if (e.target.closest('.per-editable')) return;
      if (e.target.classList.contains('team-editable')) return;
      if (e.target.closest('.team-editable')) return;
      selectPlayer(parseInt(tr.dataset.gidx));
    });
  });

  // ── INLINE DEV TRAIT EDITING: click the Dev cell to get a dropdown ──
  const DEV_OPTIONS = ['XFactor','Superstar','Normal','Declining'];
  tbody.querySelectorAll('.dev-editable[data-gidx]').forEach(span => {
    span.style.cursor = 'pointer';
    span.title = 'Click to change Dev Trait';
    span.addEventListener('click', e => {
      e.stopPropagation();
      if (span.querySelector('select')) return; // already open
      const gidx = parseInt(span.dataset.gidx);
      const p = players[gidx];
      const origVal = p.developmentTrait || '';

      const sel = document.createElement('select');
      sel.style.cssText = 'background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-family:var(--font);font-size:10px;border-radius:3px;padding:1px 2px;outline:none;';
      sel.innerHTML = '<option value="">— auto —</option>' +
        DEV_OPTIONS.map(d => `<option value="${d}"${origVal===d?' selected':''}>${d}</option>`).join('');
      span.innerHTML = '';
      span.appendChild(sel);
      sel.focus();

      function commitDev() {
        const v = sel.value;
        if (v) p.developmentTrait = v;
        else delete p.developmentTrait;
        markUnsaved();

        const badge = v
          ? `<span class="dev-badge dev-${v}">${v}</span>`
          : `<span style="color:var(--text3)">—</span>`;
        span.innerHTML = badge;

        // Sync panel if open
        if (selectedIdx === gidx) {
          const panelSel = document.querySelector('#panel-body [data-key="developmentTrait"]');
          if (panelSel) panelSel.value = v;
        }
      }

      sel.addEventListener('change', () => { commitDev(); });
      sel.addEventListener('blur',   () => { setTimeout(commitDev, 100); });
      sel.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') { span.innerHTML = origVal ? `<span class="dev-badge dev-${origVal}">${origVal}</span>` : `<span style="color:var(--text3)">—</span>`; }
      });
    });
  });

  // ── INLINE PERSONALITY EDITING: click the Personality cell to get a dropdown ──
  tbody.querySelectorAll('.per-editable[data-gidx]').forEach(span => {
    span.style.cursor = 'pointer';
    span.title = 'Click to change Personality';
    span.addEventListener('click', e => {
      e.stopPropagation();
      if (span.querySelector('select')) return; // already open
      const gidx = parseInt(span.dataset.gidx);
      const p = players[gidx];
      const origVal = p.personalityLabel || '';

      const sel = document.createElement('select');
      sel.style.cssText = 'background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-family:var(--font);font-size:10px;border-radius:3px;padding:1px 2px;outline:none;max-width:128px;';
      sel.innerHTML = '<option value="">— procedural —</option>' +
        PERSONALITY_LABELS.map(l => `<option value="${l}"${origVal===l?' selected':''}>${l}</option>`).join('');
      span.innerHTML = '';
      span.appendChild(sel);
      sel.focus();

      function renderPerBadge(v) {
        return v
          ? `<span class="per-badge per-${PER_CATEGORY[v]||'neutral'}">${v}</span>`
          : `<span class="per-badge per-none">auto</span>`;
      }

      function commitPer() {
        const v = sel.value;
        if (v) p.personalityLabel = v;
        else delete p.personalityLabel;
        markUnsaved();
        span.innerHTML = renderPerBadge(v);
        // Sync panel if open
        if (selectedIdx === gidx) {
          const panelSel = document.querySelector('#panel-body [data-key="personalityLabel"]');
          if (panelSel) panelSel.value = v;
        }
      }

      sel.addEventListener('change', () => { commitPer(); });
      sel.addEventListener('blur',   () => { setTimeout(commitPer, 100); });
      sel.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') { span.innerHTML = renderPerBadge(origVal); }
      });
    });
  });

  // ── INLINE TEAM EDITING: click Team cell for dropdown ──
  const ALL_TEAMS = ['ARI','ATL','BAL','BUF','CAR','CHI','CIN','CLE','DAL','DEN','DET','GB','HOU','IND','JAX','KC','LAC','LAR','LV','MIA','MIN','NE','NO','NYG','NYJ','PHI','PIT','SEA','SF','TB','TEN','WAS','FA'];
  tbody.querySelectorAll('.team-editable[data-gidx]').forEach(span => {
    span.style.cursor = 'pointer';
    span.title = 'Click to change team';
    span.addEventListener('click', e => {
      e.stopPropagation();
      if (span.querySelector('select')) return;
      const gidx = parseInt(span.dataset.gidx);
      const p = players[gidx];
      const origVal = p.team || '';

      const sel = document.createElement('select');
      sel.style.cssText = 'background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-family:var(--font);font-size:11px;font-weight:600;border-radius:3px;padding:1px 2px;outline:none;width:58px;';
      sel.innerHTML = ALL_TEAMS.map(t => `<option value="${t}"${origVal===t?' selected':''}>${t}</option>`).join('');
      span.innerHTML = '';
      span.appendChild(sel);
      sel.focus();

      function commitTeam() {
        const v = sel.value;
        p.team = v;
        markUnsaved();
        span.textContent = v || '—';
        // Sync panel if open
        if (selectedIdx === gidx) {
          const panelInput = document.querySelector('#panel-body [data-key="team"]');
          if (panelInput) panelInput.value = v;
          document.getElementById('panel-meta').textContent = `${v||'FA'} · ${p.position} · OVR ${p.overall}`;
        }
      }

      sel.addEventListener('change', () => { commitTeam(); });
      sel.addEventListener('blur',   () => { setTimeout(commitTeam, 100); });
      sel.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') { span.textContent = origVal || '—'; }
      });
    });
  });

  // ── INLINE CHIP EDITING: double-click any attribute chip ──
  tbody.querySelectorAll('.chip[data-attr]').forEach(chip => attachChipEdit(chip));

  // ── INLINE FIELD EDITING: double-click OVR chip or Age/Ht/Wt/Exp cells ──
  tbody.querySelectorAll('.chip[data-field="overall"]').forEach(chip => {
    chip.addEventListener('dblclick', e => { e.stopPropagation(); makeFieldInput(chip); });
  });
  const FIELD_CONFIG = {
    overall:    { min: 40,  max: 99,  label: 'OVR' },
    age:        { min: 18,  max: 45,  label: 'Age' },
    height:     { min: 60,  max: 84,  label: 'Ht'  },
    weight:     { min: 150, max: 400, label: 'Wt'  },
    experience: { min: 0,   max: 30,  label: 'Exp' },
  };
  tbody.querySelectorAll('.cell-editable[data-field]').forEach(span => {
    span.addEventListener('dblclick', e => {
      e.stopPropagation();
      makeFieldInput(span);
    });
  });
}

function attachChipEdit(chip) {
  chip.addEventListener('dblclick', function(e) {
    e.stopPropagation();
    makeChipInput(chip);
  });
}

function makeChipInput(chip) {
  const gidx = parseInt(chip.dataset.gidx);
  const attr  = chip.dataset.attr;
  const p     = players[gidx];
  const origVal = (p.attributes && p.attributes[attr] != null) ? p.attributes[attr] : null;

  // Use type=text — type=number spinner arrows cause blur before value updates,
  // making it impossible to increment/decrement without the input closing.
  // We handle Up/Down keys manually for the same UX without the browser bug.
  const inp = document.createElement('input');
  inp.className = 'chip-input';
  inp.type = 'text';
  inp.inputMode = 'numeric';
  inp.value = origVal ?? '';
  chip.replaceWith(inp);
  inp.focus(); inp.select();

  function clamp(v) { return Math.max(40, Math.min(99, v)); }

  function commit() {
    const raw = parseInt(inp.value);
    const v = inp.value.trim() === '' ? null : clamp(isNaN(raw) ? (origVal ?? 40) : raw);
    if (!p.attributes) p.attributes = {};
    if (v === null) delete p.attributes[attr];
    else p.attributes[attr] = v;
    markUnsaved();

    const newChip = document.createElement('span');
    newChip.className = `chip ${chipClass(v)}`;
    newChip.dataset.gidx = gidx;
    newChip.dataset.attr = attr;
    newChip.textContent = v ?? '—';
    if (inp.parentNode) inp.replaceWith(newChip);
    attachChipEdit(newChip);

    if (selectedIdx === gidx) {
      const panelInput = document.querySelector(`#panel-body [data-attrkey="${attr}"]`);
      if (panelInput) panelInput.value = v ?? '';
    }
  }

  function cancel() {
    const cancelChip = document.createElement('span');
    cancelChip.className = `chip ${chipClass(origVal)}`;
    cancelChip.dataset.gidx = gidx;
    cancelChip.dataset.attr = attr;
    cancelChip.textContent = origVal ?? '—';
    if (inp.parentNode) inp.replaceWith(cancelChip);
    attachChipEdit(cancelChip);
  }

  inp.addEventListener('blur', commit);

  inp.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      inp.blur(); // triggers commit via blur
    } else if (ev.key === 'Escape') {
      ev.preventDefault();
      inp.removeEventListener('blur', commit); // prevent commit on blur
      cancel();
    } else if (ev.key === 'ArrowUp') {
      ev.preventDefault();
      const cur = parseInt(inp.value);
      inp.value = clamp(isNaN(cur) ? (origVal ?? 75) : cur + 1);
    } else if (ev.key === 'ArrowDown') {
      ev.preventDefault();
      const cur = parseInt(inp.value);
      inp.value = clamp(isNaN(cur) ? (origVal ?? 75) : cur - 1);
    }
  });

  // Only allow digits
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/[^0-9]/g, '').slice(0, 2);
  });
}

function makeFieldInput(span) {
  const gidx  = parseInt(span.dataset.gidx);
  const field  = span.dataset.field;
  const p      = players[gidx];
  const origVal = p[field] != null ? p[field] : null;

  const FIELD_CONFIG = {
    overall:    { min: 40,  max: 99,  maxLen: 2 },
    age:        { min: 18,  max: 45,  maxLen: 2 },
    height:     { min: 60,  max: 84,  maxLen: 2 },
    weight:     { min: 150, max: 400, maxLen: 3 },
    experience: { min: 0,   max: 30,  maxLen: 2 },
  };
  const cfg = FIELD_CONFIG[field] || { min: 0, max: 999, maxLen: 3 };

  const inp = document.createElement('input');
  inp.className = 'chip-input';
  inp.style.width = cfg.maxLen === 3 ? '46px' : '38px';
  inp.type = 'text';
  inp.inputMode = 'numeric';
  inp.value = origVal ?? '';
  span.replaceWith(inp);
  inp.focus(); inp.select();

  function clamp(v) { return Math.max(cfg.min, Math.min(cfg.max, v)); }

  function commit() {
    const raw = parseInt(inp.value);
    const v = inp.value.trim() === '' ? null : clamp(isNaN(raw) ? (origVal ?? cfg.min) : raw);
    if (v === null) delete p[field];
    else p[field] = v;
    markUnsaved();

    if (field === 'overall') {
      // OVR is rendered as a chip — restore as chip with updated color
      const newChip = document.createElement('span');
      newChip.className = `chip ${chipClass(v)} chip-ovr`;
      newChip.dataset.gidx  = gidx;
      newChip.dataset.field = field;
      newChip.textContent = v ?? '—';
      if (inp.parentNode) inp.replaceWith(newChip);
      newChip.addEventListener('dblclick', e => { e.stopPropagation(); makeFieldInput(newChip); });
    } else {
      const newSpan = document.createElement('span');
      newSpan.className = 'cell-editable';
      newSpan.dataset.gidx  = gidx;
      newSpan.dataset.field = field;
      newSpan.textContent = v ?? '—';
      if (inp.parentNode) inp.replaceWith(newSpan);
      newSpan.addEventListener('dblclick', e => { e.stopPropagation(); makeFieldInput(newSpan); });
    }
    // Sync panel if open
    if (selectedIdx === gidx) {
      const panelInput = document.querySelector(`#panel-body [data-key="${field}"]`);
      if (panelInput) panelInput.value = v ?? '';
    }
  }

  function cancel() {
    if (field === 'overall') {
      const cancelChip = document.createElement('span');
      cancelChip.className = `chip ${chipClass(origVal)} chip-ovr`;
      cancelChip.dataset.gidx  = gidx;
      cancelChip.dataset.field = field;
      cancelChip.textContent = origVal ?? '—';
      if (inp.parentNode) inp.replaceWith(cancelChip);
      cancelChip.addEventListener('dblclick', e => { e.stopPropagation(); makeFieldInput(cancelChip); });
    } else {
      const cancelSpan = document.createElement('span');
      cancelSpan.className = 'cell-editable';
      cancelSpan.dataset.gidx  = gidx;
      cancelSpan.dataset.field = field;
      cancelSpan.textContent = origVal ?? '—';
      if (inp.parentNode) inp.replaceWith(cancelSpan);
      cancelSpan.addEventListener('dblclick', e => { e.stopPropagation(); makeFieldInput(cancelSpan); });
    }
  }

  inp.addEventListener('blur', commit);

  inp.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      inp.blur();
    } else if (ev.key === 'Escape') {
      ev.preventDefault();
      inp.removeEventListener('blur', commit);
      cancel();
    } else if (ev.key === 'ArrowUp') {
      ev.preventDefault();
      const cur = parseInt(inp.value);
      inp.value = clamp(isNaN(cur) ? (origVal ?? cfg.min) : cur + 1);
    } else if (ev.key === 'ArrowDown') {
      ev.preventDefault();
      const cur = parseInt(inp.value);
      inp.value = clamp(isNaN(cur) ? (origVal ?? cfg.min) : cur - 1);
    }
  });

  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/[^0-9]/g, '').slice(0, cfg.maxLen);
  });
}

function ovrClass(v) {
  if (v >= 90) return 'ovr-elite';
  if (v >= 85) return 'ovr-probowl';
  if (v >= 80) return 'ovr-starter';
  if (v >= 75) return 'ovr-solid';
  if (v >= 65) return 'ovr-backup';
  return 'ovr-depth';
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else {
    sortCol = col;
    sortDir = (col === 'name' || col === 'personalityLabel') ? 'asc' : 'desc';
  }
  sortFiltered();
  renderTable();
}

function selectPlayer(globalIdx) {
  selectedIdx = globalIdx;
  pendingEdits = {};
  refreshPanel();
  renderTable();
}

function refreshPanel() {
  if (selectedIdx === null) {
    showEmptyPanel();
    return;
  }
  const p = players[selectedIdx];
  document.getElementById('panel-empty').style.display = 'none';
  const pc = document.getElementById('panel-content');
  pc.style.display = 'flex';

  document.getElementById('panel-name').textContent = `${p.firstName} ${p.lastName}`;
  document.getElementById('panel-meta').textContent = `${p.team || 'FA'} · ${p.position} · OVR ${p.overall}`;

  let html = '';

  // ── IDENTITY ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">🪪</span> Identity</div>`;
  [['firstName','First Name'],['lastName','Last Name'],['college','College']].forEach(([k,l]) => {
    html += `<div class="panel-field"><label>${l}</label><input type="text" data-key="${k}" value="${p[k]||''}"></div>`;
  });
  html += `<div class="panel-field"><label>Team</label><input type="text" data-key="team" value="${p.team||''}"></div>`;
  html += `<div class="panel-field"><label>Position</label><input type="text" data-key="position" value="${p.position||''}"></div>`;
  html += `<div class="panel-field"><label>Demographic</label>
    <select data-key="demographic">
      <option value="">— auto —</option>
      ${['black','white','hispanic'].map(d => `<option ${p.demographic===d?'selected':''}>${d}</option>`).join('')}
    </select></div>`;
  html += '</div>';

  // ── CORE ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">📊</span> Core</div>`;
  [['overall','Overall',40,99],['age','Age',18,50],['experience','Experience (yrs)',0,30],
   ['weight','Weight (lbs)',150,400],['height','Height (in)',60,84]].forEach(([k,l,mn,mx]) => {
    html += `<div class="panel-field"><label>${l}</label><input type="number" data-key="${k}" value="${p[k]??''}" min="${mn}" max="${mx}"></div>`;
  });
  html += `<div class="panel-field"><label>Dev Trait</label>
    <select data-key="developmentTrait">
      <option value="">— auto —</option>
      ${['XFactor','Superstar','Normal','Declining'].map(d => `<option ${p.developmentTrait===d?'selected':''}>${d}</option>`).join('')}
    </select></div>`;
  const potVal = (p.potential != null) ? p.potential : '';
  html += `<div class="panel-field"><label>Potential (1–10)</label><input type="number" data-key="potential" value="${potVal}" min="1" max="10" placeholder="auto"></div>`;
  html += '</div>';

  // ── DRAFT ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">🏈</span> Draft</div>`;
  html += `<div class="panel-field"><label>Draft Round</label><input type="number" data-key="draftRound" value="${p.draftRound??''}" min="1" max="7" placeholder="—"></div>`;
  html += `<div class="panel-field"><label>Draft Pick</label><input type="number" data-key="draftPick" value="${p.draftPick??''}" min="1" max="262" placeholder="—"></div>`;
  html += '</div>';

  // ── CONTRACT ──
  const contract = p.contract || {};
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">💰</span> Contract</div>`;
  html += `<div class="panel-field"><label>Annual Salary ($)</label><input type="number" data-key="contract.annualSalary" value="${contract.annualSalary??''}" min="0" placeholder="auto"></div>`;
  html += `<div class="panel-field"><label>Years</label><input type="number" data-key="contract.years" value="${contract.years??''}" min="1" max="10" placeholder="auto"></div>`;
  html += `<div class="panel-field"><label>Signing Bonus ($)</label><input type="number" data-key="contract.signingBonus" value="${contract.signingBonus??''}" min="0" placeholder="auto"></div>`;
  html += '</div>';

  // ── PERSONALITY ──
  html += `<div class="panel-section"><div class="panel-section-title"><span class="section-icon">🧠</span> Personality <button class="per-clear-btn" onclick="clearPersonality()" style="margin-left:auto;">✕ Clear All</button></div>`;
  html += `<div class="panel-field"><label>Label</label>
    <select data-key="personalityLabel" id="per-label-select">
      <option value="">— procedural —</option>
      ${PERSONALITY_LABELS.map(l => `<option ${p.personalityLabel===l?'selected':''}>${l}</option>`).join('')}
    </select></div>`;

  // hiddenPersonality sliders
  const hp = p.hiddenPersonality || {};
  html += `<div style="margin-top:10px; margin-bottom:4px; font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em;">Hidden Traits (1–20)</div>`;
  HP_TRAITS.forEach(trait => {
    const val = hp[trait] ?? '';
    const displayVal = val !== '' ? val : '—';
    html += `<div class="slider-row" id="hp-row-${trait}">
      <label>${formatTraitLabel(trait)}</label>
      <input type="range" min="1" max="20" value="${val||10}"
        data-hptrait="${trait}"
        class="${val ? sliderClass(val) : ''}"
        oninput="onSliderInput(this)"
        ${!val ? 'style="opacity:0.35"' : ''}>
      <span class="slider-val" id="hpval-${trait}">${displayVal}</span>
    </div>`;
  });
  html += `<div style="font-size:9px; color:var(--text3); margin-top:4px; font-style:italic;">Dimmed = not set (will be auto-derived from label).<br>Move any slider to lock in a value.</div>`;

  const pAttrs = p.attributes || {};
  if (attrs.length) {

    html += `<div class="attr-note">Range 40–99. Blank = auto-generated from OVR.</div>`;
    html += `<div class="attr-grid">`;
    attrs.forEach(a => {
      html += `<div class="attr-item">
        <label title="${a}">${a}</label>
        <input type="number" data-attrkey="${a}" value="${pAttrs[a]??''}" min="40" max="99" placeholder="—">

    html += '</div></div>';
  }

  document.getElementById('panel-body').innerHTML = html;

  // Attach change listeners
  document.querySelectorAll('#panel-body [data-key]').forEach(el => {
    el.addEventListener('change', onPanelFieldChange);
    el.addEventListener('input', onPanelFieldChange);
  });
  document.querySelectorAll('#panel-body [data-attrkey]').forEach(el => {
    el.addEventListener('change', onAttrFieldChange);
  });
  document.querySelectorAll('#panel-body [data-hptrait]').forEach(el => {
    el.addEventListener('change', onSliderChange);
  });
}

function formatTraitLabel(t) {
  return t.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
}

function sliderClass(v) {
  v = parseInt(v);
  if (v >= 15) return 'slider-high';
  if (v <= 6)  return 'slider-low';
  return '';
}

function onSliderInput(el) {
  const trait = el.dataset.hptrait;
  const val = parseInt(el.value);
  el.className = 'slider-' + (val >= 15 ? 'high' : val <= 6 ? 'low' : '');
  el.style.opacity = '1';
  document.getElementById('hpval-' + trait).textContent = val;
  // mark as pending
  if (!pendingEdits.hiddenPersonality) pendingEdits.hiddenPersonality = {};
  pendingEdits.hiddenPersonality[trait] = val;
  markUnsaved();
}

function onSliderChange(el) {
  onSliderInput(el);
}

function onPanelFieldChange(e) {
  const el = e.target;
  const key = el.dataset.key;
  const val = el.type === 'number' ? (el.value === '' ? null : parseFloat(el.value)) : el.value;
  pendingEdits[key] = val;
  markUnsaved();
}

function onAttrFieldChange(e) {
  const el = e.target;
  const key = el.dataset.attrkey;
  const val = el.value === '' ? null : parseInt(el.value);
  if (!pendingEdits.attributes) pendingEdits.attributes = {};
  pendingEdits.attributes[key] = val;
  markUnsaved();
}

function clearPersonality() {
  // Reset both label and hidden personality to unset
  const sel = document.getElementById('per-label-select');
  if (sel) sel.value = '';
  HP_TRAITS.forEach(trait => {
    const slider = document.querySelector(`[data-hptrait="${trait}"]`);
    const valEl  = document.getElementById('hpval-' + trait);
    if (slider) { slider.value = 10; slider.className = ''; slider.style.opacity = '0.35'; }
    if (valEl)  valEl.textContent = '—';
  });
  pendingEdits['personalityLabel'] = '';
  pendingEdits['hiddenPersonality'] = null; // signal to delete
  markUnsaved();
  toast('Personality cleared — will be procedurally generated');
}

function savePanel() {
  if (selectedIdx === null) return;
  const p = players[selectedIdx];

  // Apply flat field edits
  for (const [key, val] of Object.entries(pendingEdits)) {
    if (key === 'attributes' || key === 'hiddenPersonality') continue;
    if (key.startsWith('contract.')) {
      const subkey = key.split('.')[1];
      if (!p.contract) p.contract = {};
      if (val === null || val === '') delete p.contract[subkey];
      else p.contract[subkey] = val;
      continue;
    }
    if (val === null || val === '') {
      // For numeric optional fields, delete key vs set to null
      if (['draftRound','draftPick','potential'].includes(key)) delete p[key];
      else if (val === '') delete p[key];
      else p[key] = val;
    } else {
      p[key] = val;
    }
  }

  // personalityLabel special handling
  if ('personalityLabel' in pendingEdits) {
    if (!pendingEdits.personalityLabel) delete p.personalityLabel;
    else p.personalityLabel = pendingEdits.personalityLabel;
  }

  // hiddenPersonality special handling
  if ('hiddenPersonality' in pendingEdits) {
    if (pendingEdits.hiddenPersonality === null) {
      delete p.hiddenPersonality;
    } else {
      if (!p.hiddenPersonality) p.hiddenPersonality = {};
      Object.assign(p.hiddenPersonality, pendingEdits.hiddenPersonality);
    }
  } else if (pendingEdits.hiddenPersonality && typeof pendingEdits.hiddenPersonality === 'object') {
    if (!p.hiddenPersonality) p.hiddenPersonality = {};
    Object.assign(p.hiddenPersonality, pendingEdits.hiddenPersonality);
  }

  // Attribute edits
  if (pendingEdits.attributes) {
    if (!p.attributes) p.attributes = {};
    for (const [ak, av] of Object.entries(pendingEdits.attributes)) {
      if (av === null) delete p.attributes[ak];
      else p.attributes[ak] = av;
    }
    if (!Object.keys(p.attributes).length) delete p.attributes;
  }

  pendingEdits = {};
  markUnsaved();
  refreshPanel();
  renderTable();
  document.getElementById('panel-meta').textContent = `${p.team||'FA'} · ${p.position} · OVR ${p.overall}`;
  toast('Player saved');
}

function discardChanges() {
  pendingEdits = {};
  refreshPanel();
}

function showEmptyPanel() {
  document.getElementById('panel-empty').style.display = 'flex';
  document.getElementById('panel-content').style.display = 'none';
}

function markUnsaved() {
  document.getElementById('unsaved-dot').style.display = 'block';
}

function onSearchInput() {
  const val = document.getElementById('search').value;
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  applyFilters();
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  applyFilters();
  document.getElementById('search').focus();
}

function saveInPlace() {
  if (!rosterData) { toast('No roster loaded', true); return; }
  rosterData.meta = rosterData.meta || {};
  rosterData.meta.updatedAt = Date.now();
  // Clean null/empty optional fields in place
  rosterData.players = rosterData.players.map(p => {
    if (p.potential === null) delete p.potential;
    if (p.draftRound === null) delete p.draftRound;
    if (p.draftPick  === null) delete p.draftPick;
    if (p.contract && !Object.keys(p.contract).length) delete p.contract;
    if (p.hiddenPersonality && !Object.keys(p.hiddenPersonality).length) delete p.hiddenPersonality;
    return p;
  });
  players = rosterData.players;
  document.getElementById('unsaved-dot').style.display = 'none';
  const status = document.getElementById('file-status');
  const currentText = status.textContent.replace(/ · unsaved changes$/, '');
  status.textContent = currentText;
  toast('Changes committed — Export JSON to download');
}

// ─────────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────────
function exportJSON() {
  if (!rosterData) { toast('No roster loaded', true); return; }
  const out = JSON.parse(JSON.stringify(rosterData));
  // Clean null potential values
  out.players = out.players.map(p => {
    if (p.potential === null) delete p.potential;
    if (p.draftRound === null) delete p.draftRound;
    if (p.draftPick  === null) delete p.draftPick;
    // Clean empty contract sub-objects
    if (p.contract && !Object.keys(p.contract).length) delete p.contract;
    // Clean empty hiddenPersonality
    if (p.hiddenPersonality && !Object.keys(p.hiddenPersonality).length) delete p.hiddenPersonality;
    return p;
  });
  out.meta = out.meta || {};
  out.meta.updatedAt = Date.now();
  const blob = new Blob([JSON.stringify(out, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'Claude_Roster_Edited.json'; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('unsaved-dot').style.display = 'none';
  toast('Exported Claude_Roster_Edited.json');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let _toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}
</script>
